<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>


<body onload="checkLogin()"></body>
<header>
  <h2>BlogNest</h2>

  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<section class="hero dashboard-hero">
    <div class="dashboard-content">
    <h1 id="welcome"></h1>

    <p class="dashboard-text">
          Manage your blog posts and
profile here.
</p>
</div>
</section>

<section class="features">

  <a href="create.html" class="feature-card">
    <h3>📝 Write Blogs</h3>
    <p>Create and publish your own blogs easily.</p>
  </a>

<a href="index.html#post-list"
   class="feature-card">
  <h3>🔍 Explore Topics</h3>
  <p>Browse blogs by technology, coding
     and more.</p>
</a>

<a href="index.html#post-list"
 class="feature-card">
  <h3>💬 Connect Users</h3>
  <p>Like, comment and interact with
     readers.</p>
</a>
</section>

<footer>
  <p>© 2026 BlogNest | Dashboard</p>
</footer>

<script>

const email = localStorage.getItem("userEmail");

if(email){

    const username = email.split("@")[0];

    document.getElementById("welcome").innerText =
    "Welcome " + username;
}

</script>
<script>
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "login.html";
}
</script>

</body>
</html>
